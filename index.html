<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Core</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>HABIT CORE</h1>
    </header>

    <section class="dashboard">
        <div class="card">
            <span>⭐</span>
            <p>Points</p>
            <h2>0</h2>
        </div>
        <div class="card">
            <span>🔥</span>
            <p>Streak</p>
            <h2>0</h2>
        </div>
        <div class="card">
            <span>🎯</span>
            <p>Challenge</p>
            <h2>1/1</h2>
        </div>
        <div class="card">
            <span>🌱</span>
            <p>Habits</p>
            <h2>0/5</h2>
        </div>
    </section>

    <section class="buttons">
        <button>Habits</button>
        <button>Challenges</button>
        <button>Dashboard</button>
        <button>Store</button>
    </section>

    <section class="world-preview">
        <h3>Your World</h3>
        <div class="preview-box">
            <p>🌱 Growing...</p>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="#">🏠</a>
        <a href="#">🌱</a>
        <a href="#">🎯</a>
        <a href="#">🛒</a>
    </nav>

</body>
</html>
